<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>AVM Remote</title>
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AVM" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1>AVM&nbsp;90</h1>
      <div class="topbar-right">
        <span id="conn" class="conn" title="Connection status">
          <span class="dot"></span><span id="conn-text">connecting…</span>
        </span>
        <button id="settings-btn" class="icon-btn" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings sheet -->
    <div id="settings" class="overlay">
      <div class="sheet">
        <header class="sheet-head">
          <h2>Settings</h2>
          <button id="settings-close" class="icon-btn" aria-label="Close settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" />
            </svg>
          </button>
        </header>
        <div class="setting-row">
          <span class="setting-label">Volume display</span>
          <div class="segmented" id="seg-volume-unit">
            <button type="button" data-value="db">dB</button>
            <button type="button" data-value="pct">%</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">
            Maximum volume
            <small>sets the receiver's volume limit</small>
          </span>
          <span class="num-field">
            <input
              id="set-max-vol"
              class="num-input"
              type="number"
              step="0.5"
              min="-90"
              max="10"
            />
            <span class="num-unit">dB</span>
          </span>
        </div>
      </div>
    </div>

    <main>
      <!-- Power -->
      <button id="power" class="power" aria-label="Power">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v9" />
          <path d="M7.5 6.7a7 7 0 1 0 9 0" />
        </svg>
        <span id="power-label">Power</span>
      </button>

      <!-- Now playing -->
      <section class="card now-playing">
        <div class="np-input" id="np-input">—</div>
        <div class="np-meta">
          <span id="np-mode">—</span>
          <span id="np-format"></span>
        </div>
      </section>

      <!-- Volume -->
      <section class="card volume">
        <div class="vol-readout" id="vol-readout" title="Tap to enter a value">
          <span id="vol-value">—</span><span class="vol-unit">dB</span>
          <input
            id="vol-input"
            class="vol-input"
            type="number"
            inputmode="numeric"
            step="1"
            hidden
          />
        </div>
        <input
          id="vol-slider"
          class="vol-slider"
          type="range"
          min="0"
          max="100"
          value="0"
        />
        <div class="vol-buttons">
          <button id="vol-down" class="round" aria-label="Volume down">−</button>
          <button id="mute" class="mute" aria-label="Mute">Mute</button>
          <button id="vol-up" class="round" aria-label="Volume up">+</button>
        </div>
      </section>

      <!-- Inputs -->
      <section class="card">
        <h2>Input</h2>
        <div id="inputs" class="grid"></div>
      </section>

      <!-- Listening modes -->
      <section class="card">
        <h2>Listening Mode</h2>
        <div id="modes" class="grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
